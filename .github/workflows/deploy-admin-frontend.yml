name: Deploy Admin Frontend

on:
  push:
    branches:
      - main
    paths:
      - "apps/admin_frontend/**"
      - "packages/validations/**"
      - "packages/ui/**"
      - ".github/workflows/deploy-admin-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build validations package
        run: npm run build --workspace=packages/validations

      - name: Create modified package.json for Vercel
        working-directory: apps/admin_frontend
        run: |
          # Create a clean package.json without problematic packages
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            
            // Remove problematic dev dependencies
            if (pkg.devDependencies) {
              delete pkg.devDependencies['@repo/eslint-config'];
              delete pkg.devDependencies['@repo/typescript-config'];
            }
            
            // Ensure build script is correct
            pkg.scripts.build = 'next build --webpack';
            
            // Write to a new file
            fs.writeFileSync('package-vercel.json', JSON.stringify(pkg, null, 2));
            
            // Backup original and replace
            fs.copyFileSync('package.json', 'package-original.json');
            fs.copyFileSync('package-vercel.json', 'package.json');
          "

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: apps/admin_frontend
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prod --token=$VERCEL_TOKEN

      - name: Restore original package.json
        if: always()
        working-directory: apps/admin_frontend
        run: |
          if [ -f package-original.json ]; then
            mv package-original.json package.json
          fi
