name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "packages/db/**"
      - "packages/validations/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build validations package
        run: npm run build --workspace=packages/validations

      - name: Build db package
        run: npm run build --workspace=packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build backend
        run: npm run build --workspace=apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          debug: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ~/hellofi_turborepo

            git pull origin main

            npm ci

            npm run build --workspace=packages/validations

            npm run build --workspace=packages/db

            cd packages/db && npx prisma migrate deploy && cd ../..

            npm run build --workspace=apps/backend

            pm2 restart hellofi-new-backend --update-env || pm2 start apps/backend/dist/index.js --name hellofi-new-backend

            pm2 save
